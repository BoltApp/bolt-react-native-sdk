name: Release & Publish

on:
  push:
    branches: [main]

jobs:
  ci:
    # Skip if the push is a release commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    uses: ./.github/workflows/ci.yml

  release-and-publish:
    name: Release & Publish
    needs: ci
    runs-on: ubuntu-24.04-16-cores
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOLT_CI_GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "bolt-ci"
          git config user.email "bolt-ci@bolt.com"

      - uses: ./.github/actions/setup

      - name: Release version
        run: yarn release --ci
        env:
          GITHUB_TOKEN: ${{ secrets.BOLT_CI_GITHUB_TOKEN }}

      - name: Setup npm registry
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: yarn prepare

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
