name: Release & Publish

on:
  push:
    branches: [main]

jobs:
  ci:
    # Skip if the push is a release commit (to avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    uses: ./.github/workflows/ci.yml

  release-and-publish:
    name: Release & Publish
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLIC_BOLT_CI_GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "bolt-ci"
          git config user.email "bolt-ci@bolt.com"

      - uses: ./.github/actions/setup

      - name: Release version
        id: release
        run: |
          VERSION_BEFORE=$(node -p "require('./package.json').version")
          yarn release --ci
          VERSION_AFTER=$(node -p "require('./package.json').version")
          if [ "$VERSION_BEFORE" = "$VERSION_AFTER" ]; then
            echo "No version bump — skipping publish"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped: $VERSION_BEFORE → $VERSION_AFTER"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_BOLT_CI_GITHUB_TOKEN }}

      - name: Setup npm registry
        if: steps.release.outputs.bumped == 'true'
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Build
        if: steps.release.outputs.bumped == 'true'
        run: yarn prepare

      - name: Publish to npm
        if: steps.release.outputs.bumped == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
